<nav class="crm-navbar" id="crm-navbar">
  <div class="crm-nav-inner">

    <!-- Logo -->
    <a class="crm-nav-brand" href="/">
      <div class="crm-nav-logo">💪</div>
      <span>Fitness<strong>CRM</strong></span>
    </a>

    <!-- Nav links -->
    <nav class="crm-nav-links">
      <a href="{% url 'fitness:clients-list' %}" class="crm-nav-link">Clients</a>
      <a href="{% url 'fitness:trainers-list' %}" class="crm-nav-link">Trainers</a>
      <a href="{% url 'fitness:workout-session-list' %}" class="crm-nav-link">Sessions</a>
      <a href="{% url 'fitness:workout-program-list' %}" class="crm-nav-link">Programs</a>
      <a href="{% url 'fitness:exercise-list' %}" class="crm-nav-link">Exercises</a>
    </nav>

    <!-- Right -->
    <!-- Right -->
    {% if user.is_authenticated %}
      <form method="post" action="{% url 'logout' %}" style="margin-left: auto; flex-shrink: 0;">
        {% csrf_token %}
        <button type="submit" class="crm-nav-logout">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </form>
    {% else %}
      <a href="{% url 'login' %}" class="crm-nav-logout" style="margin-left: auto; flex-shrink: 0; text-decoration: none;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Login
      </a>
    {% endif %}

  </div>
</nav>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0F1117;
    font-family: 'Inter', sans-serif;
    color: #F0F2F5;
  }

  .crm-navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 17, 23, 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .crm-nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* Brand */
  .crm-nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: #F0F2F5;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .crm-nav-brand strong { color: #4361EE; }

  .crm-nav-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #4361EE, #7B5CFA);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  /* Nav links */
  .crm-nav-links {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .crm-nav-link {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #8892A4;
    text-decoration: none;
    transition: color 0.15s, background 0.15s;
    white-space: nowrap;
  }

  .crm-nav-link:hover {
    color: #F0F2F5;
    background: rgba(255,255,255,0.06);
  }

  .crm-nav-link.active {
    color: #F0F2F5;
    background: rgba(255,255,255,0.08);
  }

  /* Logout button */
  .crm-nav-logout {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #8892A4;
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .crm-nav-logout:hover {
    color: #F0F2F5;
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
  }

  @media (max-width: 600px) {
    .crm-search-kbd { display: none; }
    .crm-search-input { padding-right: 12px; }
    .crm-nav-brand span { display: none; }
  }
</style>

<script>
  const path = window.location.pathname;
  document.querySelectorAll('.crm-nav-link').forEach(link => {
    if (link.getAttribute('href') && path.startsWith(link.getAttribute('href'))) {
      link.classList.add('active');
    }
  });
</script>
