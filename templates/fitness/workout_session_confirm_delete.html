{% extends "layouts/base-presentation.html" %}
{% load static %}

{% block stylesheets %}
  <link rel="stylesheet" href="{% static 'css/crm.css' %}">
{% endblock stylesheets %}

{% block content %}
<div class="crm-wrapper">
  <div class="delete-wrap">
    <div class="delete-card">

      <div class="delete-icon">🗑</div>
      <h1>Delete Workout Session?</h1>
      <p>This action cannot be undone.<br>The Workout Session will be permanently removed from the CRM.</p>

      <form action="" method="post">
        {% csrf_token %}
        <div class="delete-actions">
          <button type="submit" class="btn-confirm-delete">Yes, Delete</button>
          <a href="{% url 'fitness:workout-session-list' %}" class="btn-cancel">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>
{% endblock %}
