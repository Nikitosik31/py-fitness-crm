{% extends "layouts/base-presentation.html" %}
{% load crispy_forms_filters %}
{% load static %}

{% block stylesheets %}
  <link rel="stylesheet" href="{% static 'css/crm.css' %}">
{% endblock stylesheets %}

{% block content %}
<div class="crm-wrapper">
  <div class="form-wrap">
    <div class="form-card">

      <div class="form-header">
        <div class="eyebrow">Fitness CRM</div>
        <h1>{{ object|yesno:"Update,Create" }} Workout Session</h1>
      </div>

      <form action="" method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}

        <div class="form-divider"></div>

        <div class="form-actions">
          <button type="submit" class="btn-submit">
            {{ object|yesno:"Save Changes,Create Workout Session" }}
          </button>
          <a href="{% url 'fitness:workout-session-list' %}" class="btn-cancel">
            Cancel
          </a>
        </div>
      </form>

    </div>
  </div>
</div>
{% endblock %}
