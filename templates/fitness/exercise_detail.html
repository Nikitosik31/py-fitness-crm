{% extends "layouts/base-presentation.html" %}
{% load static %}

{% block stylesheets %}
  <link rel="stylesheet" href="{% static 'css/crm.css' %}">
  <style>
    .exercise-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .exercise-card::after {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: #FFD166;
      opacity: 0.03;
      pointer-events: none;
    }

    .exercise-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .exercise-icon {
      width: 60px; height: 60px;
      border-radius: 16px;
      background: linear-gradient(135deg, #FFD166, #FF6B35);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .exercise-identity { flex: 1; }

    .exercise-identity .eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-green);
      margin-bottom: 4px;
    }

    .exercise-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .exercise-muscle {
      display: inline-block;
      padding: 3px 12px;
      background: rgba(255,209,102,0.1);
      border: 1px solid rgba(255,209,102,0.2);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: #FFD166;
    }

    .exercise-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-action:hover { opacity: 0.82; transform: translateY(-1px); }
    .btn-update { background: rgba(67,97,238,0.1); border: 1px solid rgba(67,97,238,0.22); color: var(--accent-blue); }
    .btn-delete { background: rgba(255,75,75,0.08); border: 1px solid rgba(255,75,75,0.18); color: #FF4B4B; }

    .exercise-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 20px;
    }

    .exercise-desc-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .exercise-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.8;
      padding: 18px 20px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .exercise-card { animation: fadeUp 0.4s ease both; }

    @media (max-width: 560px) {
      .exercise-top { flex-direction: column; align-items: flex-start; }
      .exercise-actions { width: 100%; }
      .btn-action { flex: 1; justify-content: center; }
    }
  </style>
{% endblock stylesheets %}

{% block content %}
<div class="crm-wrapper">
  <div class="exercise-card">

    <div class="exercise-top">
      <div class="exercise-icon">⚡</div>
      <div class="exercise-identity">
        <div class="eyebrow">Exercise</div>
        <div class="exercise-name">{{ exercise.name }}</div>
        <span class="exercise-muscle">{{ exercise.muscle_group }}</span>
      </div>
      <div class="exercise-actions">
        <a href="{% url 'fitness:exercise-update' pk=exercise.id %}" class="btn-action btn-update">✏️ Update</a>
        <a href="{% url 'fitness:exercise-delete' pk=exercise.id %}" class="btn-action btn-delete">🗑 Delete</a>
      </div>
    </div>

    <div class="exercise-divider"></div>

    <div class="exercise-desc-label">Description</div>
    <div class="exercise-desc">{{ exercise.description }}</div>

  </div>
</div>
{% endblock %}
