{% extends "layouts/base-presentation.html" %}
{% load crispy_forms_filters %}
{% load static %}

{% block stylesheets %}
  <link rel="stylesheet" href="{% static 'css/crm.css' %}">
  <style>
    .form-wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
    }

    .form-card::after {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: var(--accent-blue);
      opacity: 0.04;
      pointer-events: none;
    }

    /* Header */
    .form-header {
      margin-bottom: 32px;
    }

    .form-header .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-green);
      margin-bottom: 6px;
    }

    .form-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    /* Crispy form overrides */
    .form-card .form-group,
    .form-card .mb-3 {
      margin-bottom: 20px !important;
    }

    .form-card label {
      font-size: 12px !important;
      font-weight: 600 !important;
      letter-spacing: 0.07em !important;
      text-transform: uppercase !important;
      color: var(--text-secondary) !important;
      margin-bottom: 8px !important;
      display: block;
    }

    .form-card input[type="text"],
    .form-card input[type="email"],
    .form-card input[type="number"],
    .form-card input[type="password"],
    .form-card select,
    .form-card textarea {
      width: 100% !important;
      background: rgba(255,255,255,0.04) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 10px !important;
      padding: 11px 14px !important;
      font-size: 14px !important;
      font-family: 'Inter', sans-serif !important;
      color: var(--text-primary) !important;
      outline: none !important;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s !important;
      -webkit-appearance: none;
    }

    .form-card input:focus,
    .form-card select:focus,
    .form-card textarea:focus {
      border-color: var(--accent-blue) !important;
      background: rgba(67, 97, 238, 0.06) !important;
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15) !important;
    }

    .form-card input::placeholder,
    .form-card textarea::placeholder {
      color: var(--text-secondary) !important;
      opacity: 0.6;
    }

    .form-card select option {
      background: #16191F;
      color: var(--text-primary);
    }

    .form-card textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Error styles */
    .form-card .invalid-feedback,
    .form-card .errorlist {
      font-size: 12px !important;
      color: #FF4B4B !important;
      margin-top: 5px !important;
    }

    .form-card .is-invalid {
      border-color: #FF4B4B !important;
    }

    /* Divider */
    .form-divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* Buttons */
    .form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-submit {
      flex: 1;
      padding: 12px 24px;
      background: var(--accent-blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-submit:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-cancel {
      padding: 12px 20px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      display: inline-flex;
      align-items: center;
    }

    .btn-cancel:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
    }
  </style>
{% endblock stylesheets %}

{% block content %}
<div class="crm-wrapper">
  <div class="form-wrap">
    <div class="form-card">

      <div class="form-header">
        <div class="eyebrow">Fitness CRM</div>
        <h1>{{ object|yesno:"Update,Create" }} Trainer</h1>
      </div>

      <form action="" method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}

        <div class="form-divider"></div>

        <div class="form-actions">
          <button type="submit" class="btn-submit">
            {{ object|yesno:"Save Changes,Create Trainer" }}
          </button>
          <a href="{% url 'fitness:trainers-list' %}" class="btn-cancel">
            Cancel
          </a>
        </div>
      </form>

    </div>
  </div>
</div>
{% endblock %}
